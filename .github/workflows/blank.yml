name: WARP Proxy Tunnel

on:
  workflow_dispatch:

jobs:
  warp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install base tools
        run: |
          sudo apt update
          sudo apt install -y curl wget tar python3-pip net-tools

      - name: Install WGCF
        run: |
          wget -q https://github.com/ViRb3/wgcf/releases/latest/download/wgcf_2.2.30_linux_amd64 -O wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          yes | wgcf register
          wgcf generate

      - name: Install WireProxy
        run: |
          wget -q https://github.com/pufferffish/wireproxy/releases/latest/download/wireproxy_linux_amd64.tar.gz
          tar -xzf wireproxy_linux_amd64.tar.gz
          chmod +x wireproxy
          sudo mv wireproxy /usr/local/bin/

      - name: Build WireProxy config
        run: |
          mkdir warp
          PRIVATE=$(grep PrivateKey wgcf-profile.conf | cut -d " " -f3)
          ADDRESS=$(grep Address wgcf-profile.conf | cut -d " " -f3)
          DNS=$(grep DNS wgcf-profile.conf | cut -d " " -f3)
          PUBLIC=$(grep PublicKey wgcf-profile.conf | cut -d " " -f3)
          ENDPOINT=$(grep Endpoint wgcf-profile.conf | cut -d " " -f3)

          cat > warp/config.ini <<EOF
          [Interface]
          PrivateKey = $PRIVATE
          Address = $ADDRESS
          DNS = $DNS

          [Peer]
          PublicKey = $PUBLIC
          Endpoint = $ENDPOINT

          [Socks5]
          BindAddress = 127.0.0.1:1080
          EOF

      - name: Start WARP SOCKS5
        run: |
          nohup wireproxy -c warp/config.ini > warp.log 2>&1 &
          sleep 8
          netstat -tulpn | grep 1080

      - name: Test WARP
        run: |
          curl --socks5 127.0.0.1:1080 https://ipinfo.io

      - name: Install Python bridge
        run: |
          pip3 install flask requests pysocks

      - name: Create HTTP bridge
        run: |
          cat > proxy.py <<'PY'
          from flask import Flask, request, Response, stream_with_context
          import requests
          import urllib3

          # غیرفعال کردن هشدارهای SSL برای تمیز ماندن لاگ
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          app = Flask(__name__)
          SOCKS = "socks5h://127.0.0.1:1080"

          @app.route("/", methods=["GET", "POST", "PUT", "DELETE", "PATCH"])
          def proxy():
              url = request.args.get("url")
              if not url:
                  return "❌ داداش آدرس سایت رو یادت رفت بفرستی!", 400

              # کپی هدرها (بجز Host که باعث ارور 403 میشه)
              headers = {k: v for k, v in request.headers if k.lower() != 'host'}

              try:
                  # مرحله ۱: درخواست با stream=True
                  # این یعنی فقط هدرها رو میگیره و منتظر بدنه نمیمونه
                  r = requests.request(
                      method=request.method,
                      url=url,
                      headers=headers,
                      data=request.get_data(),
                      cookies=request.cookies,
                      proxies={"http": SOCKS, "https": SOCKS},
                      allow_redirects=True,
                      stream=True, 
                      timeout=20,
                      verify=False
                  )

                  # فیلتر کردن هدرهای Hop-by-Hop که نباید فوروارد بشن
                  excluded_headers = [
                      'content-encoding', 'transfer-encoding', 'connection', 
                      'keep-alive', 'proxy-authenticate', 'proxy-authorization'
                  ]
                  response_headers = [
                      (k, v) for k, v in r.raw.headers.items()
                      if k.lower() not in excluded_headers
                  ]

                  # مرحله ۲: ایجاد یک Generator برای ارسال لقمه‌لقمه دیتا
                  def generate():
                      try:
                          # هر ۱۶ کیلوبایت که اومد، بفرستش بره
                          for chunk in r.iter_content(chunk_size=16384):
                              if chunk:
                                  yield chunk
                      finally:
                          r.close()

                  # مرحله ۳: بازگرداندن پاسخ به صورت Stream
                  return Response(
                      stream_with_context(generate()), 
                      status=r.status_code, 
                      headers=response_headers
                  )

              except Exception as e:
                  return f"🔥 انفجار در پروکسی: {str(e)}", 500

          if __name__ == "__main__":
              # اجرای فلاسک به صورت Threaded برای مدیریت درخواست‌های همزمان
              app.run(host="0.0.0.0", port=8080, threaded=True)
          PY
      - name: Start HTTP bridge
        run: |
          nohup python3 proxy.py > proxy.log 2>&1 &
          sleep 5
          netstat -tulpn | grep 8080

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Start Tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:8080 > tunnel.log 2>&1 &
          sleep 10
          cat tunnel.log

      - name: Keep runner alive
        run: |
          for i in $(seq 1 360)
          do
            curl --socks5 127.0.0.1:1080 https://ipinfo.io/ip
            sleep 60
          done
