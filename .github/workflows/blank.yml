name: WARP Proxy Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  warp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl wget tar python3-pip

      - name: Install WGCF
        run: |
          wget -q https://github.com/ViRb3/wgcf/releases/latest/download/wgcf_2.2.30_linux_amd64 -O wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/

          yes | wgcf register --accept-tos || true
          wgcf generate

      - name: Install WireProxy
        run: |
          wget -q https://github.com/pufferffish/wireproxy/releases/latest/download/wireproxy_linux_amd64.tar.gz -O wireproxy.tar.gz
          tar -xzf wireproxy.tar.gz
          chmod +x wireproxy
          sudo mv wireproxy /usr/local/bin/

      - name: Build WireProxy Config
        run: |
          mkdir warp

          PRIVATE_KEY=$(grep PrivateKey wgcf-profile.conf | awk '{print $3}')
          ADDRESS=$(grep Address wgcf-profile.conf | awk '{print $3}')
          DNS=$(grep DNS wgcf-profile.conf | awk '{print $3}')
          PUBLIC_KEY=$(grep PublicKey wgcf-profile.conf | awk '{print $3}')
          ENDPOINT=$(grep Endpoint wgcf-profile.conf | awk '{print $3}')

          cat > warp/config.ini <<EOF
          [Interface]
          PrivateKey = $PRIVATE_KEY
          Address = $ADDRESS
          DNS = ${DNS:-1.1.1.1}
          MTU = 1280

          [Peer]
          PublicKey = $PUBLIC_KEY
          Endpoint = $ENDPOINT
          AllowedIPs = 0.0.0.0/0, ::/0

          [Socks5]
          BindAddress = 127.0.0.1:1080
          EOF

      - name: Start WARP SOCKS5
        run: |
          nohup wireproxy -c warp/config.ini > warp.log 2>&1 &
          sleep 8
          echo "Wireproxy log:"
          cat warp.log
          ss -tunlp | grep 1080

      - name: Test WARP
        run: |
          curl --socks5 127.0.0.1:1080 https://ipinfo.io

      - name: Start HTTP Bridge
        run: |
          pip3 install flask requests pysocks

          cat << 'EOF' > proxy.py
          from flask import Flask, request, Response
          import requests

          app = Flask(__name__)
          SOCKS="socks5h://127.0.0.1:1080"

          @app.route("/")
          def proxy():
          url=request.args.get("url")
          if not url:
          return "missing url parameter"

          r=requests.get(url,proxies={"http":SOCKS,"https":SOCKS})
          return Response(r.content,status=r.status_code)

          app.run(host="0.0.0.0",port=8080)
          EOF

          nohup python3 proxy.py > proxy.log 2>&1 &
          sleep 5
          ss -tunlp | grep 8080

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Start Cloudflare Tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:8080 > tunnel.log 2>&1 &
          sleep 10
          echo "Tunnel info:"
          cat tunnel.log

      - name: Keep Runner Alive
        run: |
          echo "Runner alive..."

          for i in $(seq 1 360); do
            echo "Minute $i"

            curl --socks5 127.0.0.1:1080 https://ipinfo.io/ip || echo "warp check fail"

            sleep 60
          done
