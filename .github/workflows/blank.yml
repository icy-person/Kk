name: WARP SingBox Tunnel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  warp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl wget tar net-tools

      - name: Install WGCF
        run: |
          wget -q https://github.com/ViRb3/wgcf/releases/latest/download/wgcf_2.2.30_linux_amd64 -O wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/

          yes | wgcf register
          wgcf generate

      - name: Install WireProxy
        run: |
          wget -q https://github.com/pufferffish/wireproxy/releases/latest/download/wireproxy_linux_amd64.tar.gz
          tar -xzf wireproxy_linux_amd64.tar.gz
          chmod +x wireproxy
          sudo mv wireproxy /usr/local/bin/

      - name: Build WARP config
        run: |
          mkdir warp

          PRIVATE=$(grep PrivateKey wgcf-profile.conf | cut -d " " -f3)
          ADDRESS=$(grep Address wgcf-profile.conf | cut -d " " -f3)
          DNS=$(grep DNS wgcf-profile.conf | cut -d " " -f3)
          PUBLIC=$(grep PublicKey wgcf-profile.conf | cut -d " " -f3)
          ENDPOINT=$(grep Endpoint wgcf-profile.conf | cut -d " " -f3)

          cat > warp/config.ini <<EOF
          [Interface]
          PrivateKey = $PRIVATE
          Address = $ADDRESS
          DNS = $DNS

          [Peer]
          PublicKey = $PUBLIC
          Endpoint = $ENDPOINT

          [Socks5]
          BindAddress = 127.0.0.1:1080
          EOF

      - name: Start WARP
        run: |
          nohup wireproxy -c warp/config.ini > warp.log 2>&1 &
          sleep 8
          netstat -tulpn | grep 1080

      - name: Install sing-box
        run: |
          curl -L -o sing-box.tar.gz \https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box*/sing-box /usr/local/bin/


      - name: Create sing-box config
        run: |
          cat > config.json <<EOF
          {
            "log": {
              "level": "info"
            },

            "inbounds": [
              {
                "type": "http",
                "tag": "http-in",
                "listen": "0.0.0.0",
                "listen_port": 8080
              }
            ],

            "outbounds": [
              {
                "type": "socks",
                "tag": "warp",
                "server": "127.0.0.1",
                "server_port": 1080
              }
            ],

            "route": {
              "final": "warp"
            }
          }
          EOF

      - name: Start sing-box
        run: |
          nohup sing-box run -c config.json > singbox.log 2>&1 &
          sleep 5
          netstat -tulpn | grep 8080

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Start Tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:8080 > tunnel.log 2>&1 &
          sleep 10
          cat tunnel.log

      - name: Keep runner alive
        run: |
          for i in $(seq 1 360)
          do
            curl --socks5 127.0.0.1:1080 https://ipinfo.io/ip
            sleep 60
          done
