name: Build FFmpeg Libraries Only

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: 25.1.8937393
      API_LEVEL: 21
      TARGET_ARCH: arm64

    steps:

      - name: Checkout Project
        uses: actions/checkout@v4

      # -----------------------------
      # Install Required System Packages
      # -----------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make wget tar pkg-config

      # -----------------------------
      # Setup Android Tools
      # -----------------------------
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          sdkmanager "cmake;3.22.1"
          yes | sdkmanager --licenses

      # -----------------------------
      # Download FFmpeg Source
      # -----------------------------
      - name: Download FFmpeg Source
        run: |
          wget https://ffmpeg.org/releases/ffmpeg-6.1.tar.gz
          tar -xzf ffmpeg-6.1.tar.gz
          mv ffmpeg-6.1 ffmpeg_source

      # -----------------------------
      # Compile FFmpeg Libraries for Android
      # -----------------------------
      - name: Compile FFmpeg
        run: |
          NDK="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="$TOOLCHAIN/sysroot"
          API="$API_LEVEL"
          ARCH="$TARGET_ARCH"
          PREFIX="$GITHUB_WORKSPACE/ffmpeg_android"

          # Determine target triplet based on arch (only arm64 here)
          TARGET="aarch64-linux-android"

          cd ffmpeg_source

          ./configure \
            --prefix="${PREFIX}" \
            --enable-shared \
            --disable-static \
            --disable-doc \
            --disable-programs \
            --enable-cross-compile \
            --target-os=android \
            --arch="${ARCH}" \
            --sysroot="${SYSROOT}" \
            --cc="${TOOLCHAIN}/bin/${TARGET}${API}-clang" \
            --cxx="${TOOLCHAIN}/bin/${TARGET}${API}-clang++" \
            --ar="${TOOLCHAIN}/bin/llvm-ar" \
            --as="${TOOLCHAIN}/bin/${TARGET}${API}-clang" \
            --strip="${TOOLCHAIN}/bin/llvm-strip" \
            --nm="${TOOLCHAIN}/bin/llvm-nm" \
            --ranlib="${TOOLCHAIN}/bin/llvm-ranlib" \
            --extra-cflags="-fPIC"

          make -j$(nproc)
          make install

      # -----------------------------
      # Upload compiled libraries and headers
      # -----------------------------
      - name: Upload FFmpeg Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-arm64
          path: ffmpeg_android/